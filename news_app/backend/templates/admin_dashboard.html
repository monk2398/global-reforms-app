<!doctype html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>News Admin Panel</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #0b0d10; color: #f8f9fa; }
    .glass { background: rgba(24,28,35,.75); backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,.1); }
    .preview-card img { object-fit: cover; height: 160px; }
  </style>
</head>
<body>
<div class="container py-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2>🛰️ News Admin</h2>
    <a href="/admin/logout" class="btn btn-outline-light">Logout</a>
  </div>

  <div class="row g-4">
    <div class="col-lg-5">
      <div class="p-3 rounded-4 glass">
        <h5>Add News</h5>
        <form method="post" action="/admin/add" id="newsForm">
          <input class="form-control mb-2" name="title" id="title" placeholder="Title" required>
          <textarea class="form-control mb-2" name="summary" id="summary" rows="4" placeholder="Summary (<=60 words)" required></textarea>
          <select class="form-select mb-2" name="category" id="category">
            {% for category in categories %}
            <option value="{{ category }}">{{ category }}</option>
            {% endfor %}
          </select>
          <input class="form-control mb-2" name="image_url" id="image_url" placeholder="Image URL" required>
          <input class="form-control mb-3" name="source" id="source" placeholder="Source" required>
          <button class="btn btn-primary w-100">Publish</button>
        </form>
      </div>
      <div class="p-3 rounded-4 glass mt-3 preview-card">
        <h6>Preview</h6>
        <div class="card bg-dark border-secondary">
          <img src="https://placehold.co/600x300?text=Preview" id="previewImage" class="card-img-top" alt="preview">
          <div class="card-body">
            <span class="badge text-bg-info" id="previewCategory">geopolitics</span>
            <h6 class="mt-2" id="previewTitle">Your news headline</h6>
            <p class="mb-0 text-secondary" id="previewSummary">A short summary preview appears here before publishing.</p>
          </div>
        </div>
      </div>
    </div>

    <div class="col-lg-7">
      <div class="p-3 rounded-4 glass">
        <h5 class="mb-3">Latest News</h5>
        <div class="table-responsive">
          <table class="table table-dark table-hover align-middle">
            <thead><tr><th>ID</th><th>Title</th><th>Category</th><th>Actions</th></tr></thead>
            <tbody>
              {% for item in news %}
              <tr>
                <td>{{ item.id }}</td>
                <td>{{ item.title }}</td>
                <td><span class="badge text-bg-secondary">{{ item.category }}</span></td>
                <td>
                  <form class="d-inline" method="post" action="/admin/delete/{{ item.id }}">
                    <button class="btn btn-sm btn-outline-danger">Delete</button>
                  </form>
                </td>
              </tr>
              {% endfor %}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  const bindPreview = (id, target, fallback='') => {
    document.getElementById(id).addEventListener('input', (e) => {
      document.getElementById(target).textContent = e.target.value || fallback;
    });
  };
  bindPreview('title', 'previewTitle', 'Your news headline');
  bindPreview('summary', 'previewSummary', 'A short summary preview appears here before publishing.');
  bindPreview('category', 'previewCategory', 'geopolitics');
  document.getElementById('image_url').addEventListener('input', (e) => {
    document.getElementById('previewImage').src = e.target.value || 'https://placehold.co/600x300?text=Preview';
  });
</script>
</body>
</html>
